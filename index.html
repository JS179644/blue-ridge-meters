<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Blue Ridge TX — Meter Reads</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --gray-50: #F8F8F7;
    --gray-100: #EFEFED;
    --gray-200: #D3D1C7;
    --gray-400: #888780;
    --gray-600: #5F5E5A;
    --gray-900: #1A1A18;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --font: 'DM Sans', system-ui, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--gray-50);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background: #fff;
    position: relative;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* TOP BAR */
  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-icon {
    width: 38px; height: 38px;
    background: var(--blue-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-icon svg { width: 20px; height: 20px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--gray-100); }
  .back-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* PROGRESS */
  .progress-wrap { padding: 1rem 1.25rem 0.75rem; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-count { font-size: 13px; color: var(--text-secondary); }
  .progress-month { font-size: 13px; font-weight: 500; color: var(--green-dark); }
  .progress-track { height: 6px; background: var(--gray-100); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.4s ease; }

  /* SITE LIST */
  .site-list { padding: 0.75rem 1.25rem; }
  .site-card {
    display: flex; align-items: center; gap: 12px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0.9rem 1rem;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .site-card:hover { border-color: var(--border-mid); background: var(--gray-50); }
  .site-card:active { background: var(--gray-100); }
  .site-card.done { border-color: var(--green); background: var(--green-light); }
  .site-icon {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: var(--gray-100); flex-shrink: 0;
  }
  .site-card.done .site-icon { background: var(--green); }
  .site-icon svg { width: 17px; height: 17px; stroke: var(--text-tertiary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .site-card.done .site-icon svg { stroke: #fff; }
  .site-name { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; }
  .site-card.done .site-name { color: var(--green-dark); }
  .site-badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 6px;
    background: var(--gray-100); color: var(--text-tertiary);
  }
  .site-card.done .site-badge { background: var(--green); color: #fff; }
  .chevron svg { width: 16px; height: 16px; stroke: var(--text-tertiary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* SUBMIT BUTTON */
  .list-footer { padding: 0.5rem 1.25rem 2rem; }
  .btn-primary {
    width: 100%; padding: 14px;
    background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius-lg);
    font-size: 15px; font-weight: 600; font-family: var(--font);
    cursor: pointer; letter-spacing: 0.01em;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:hover { background: #1450881; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
  .btn-secondary {
    width: 100%; padding: 13px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-lg);
    font-size: 15px; font-weight: 500; font-family: var(--font);
    cursor: pointer; margin-top: 10px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:hover { background: var(--gray-50); }

  /* ENTRY FORM */
  .entry-body { padding: 1.25rem; }
  .field-group { margin-bottom: 1.25rem; }
  .field-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
  .req { color: #E24B4A; }
  .field-input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border-mid); border-radius: var(--radius-md);
    font-size: 16px; font-family: var(--font);
    color: var(--text-primary); background: #fff;
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field-input:focus { border-color: var(--blue-mid); }
  textarea.field-input { resize: none; line-height: 1.5; }

  .photo-zone {
    border: 1.5px dashed var(--border-mid);
    border-radius: var(--radius-lg);
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s;
    background: var(--gray-50);
  }
  .photo-zone:hover { border-color: var(--blue-mid); background: var(--blue-light); }
  .photo-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
    font-size: 0;
  }
  .photo-zone svg { width: 28px; height: 28px; stroke: var(--text-tertiary); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 6px; }
  .photo-zone p { font-size: 13px; color: var(--text-secondary); }
  .photo-preview {
    width: 100%; max-height: 200px; object-fit: cover;
    border-radius: var(--radius-md); margin-top: 10px;
    display: none; border: 1px solid var(--border);
  }
  .photo-taken { border-color: var(--green); background: var(--green-light); }
  .photo-taken svg { stroke: var(--green); }
  .photo-taken p { color: var(--green-dark); font-weight: 500; }

  .status-msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  .status-msg.error { color: var(--red); }
  .status-msg.success { color: var(--green-dark); }

  /* REVIEW */
  .review-body { padding: 1.25rem; }
  .review-card {
    background: var(--gray-50); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0.9rem 1rem;
    margin-bottom: 8px;
  }
  .review-site { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .review-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .review-label { color: var(--text-tertiary); }
  .review-val { font-weight: 500; color: var(--text-primary); }
  .review-photo-ok { color: var(--green-dark); font-weight: 500; }

  /* LOADING */
  .loading-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60vh; gap: 16px;
    color: var(--text-secondary); font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2.5px solid var(--gray-200);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* DONE */
  .done-screen {
    text-align: center; padding: 3rem 1.5rem;
  }
  .done-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--green-light); margin: 0 auto 1.5rem;
    display: flex; align-items: center; justify-content: center;
  }
  .done-icon svg { width: 36px; height: 36px; stroke: var(--green); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .done-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--text-secondary); font-size: 14px; }
</style>
</head>
<body>
<div class="app">

  <!-- LOADING -->
  <div id="screen-loading" class="screen active">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Loading occupied sites...</p>
    </div>
  </div>

  <!-- SITE LIST -->
  <div id="screen-list" class="screen">
    <div class="topbar">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div style="flex:1">
        <div class="topbar-title">Blue Ridge TX</div>
        <div class="topbar-sub">Monthly electric meter reads</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-row">
        <span class="progress-count" id="progress-label">0 of 0 complete</span>
        <span class="progress-month" id="month-label"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="site-list" id="site-list"></div>
    <div class="list-footer" id="list-footer" style="display:none">
      <button class="btn-primary" onclick="goToReview()">Review &amp; submit all reads</button>
    </div>
  </div>

  <!-- ENTRY FORM -->
  <div id="screen-entry" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goToList()" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div style="flex:1">
        <div class="topbar-title" id="entry-site-name">Site 1</div>
        <div class="topbar-sub" id="entry-counter"></div>
      </div>
    </div>
    <div class="entry-body">
      <div class="field-group">
        <div class="field-label">Meter reading (kWh) <span class="req">*</span></div>
        <input class="field-input" type="number" id="input-reading" placeholder="e.g. 4823" inputmode="numeric" />
      </div>
      <div class="field-group">
        <div class="field-label">Meter photo <span class="req">*</span></div>
        <div class="photo-zone" id="photo-zone">
          <input type="file" accept="image/*" capture="environment" id="input-photo" onchange="handlePhoto(this)" />
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <p id="photo-label">Tap to take photo or upload</p>
          <img id="photo-preview" class="photo-preview" alt="Meter photo preview" />
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">Notes (optional)</div>
        <textarea class="field-input" id="input-notes" rows="2" placeholder="Any issues, damage, or comments..."></textarea>
      </div>
      <button class="btn-primary" onclick="saveEntry()">Save &amp; next site</button>
      <button class="btn-secondary" onclick="goToList()">Back to site list</button>
      <div class="status-msg" id="entry-status"></div>
    </div>
  </div>

  <!-- REVIEW -->
  <div id="screen-review" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goToList()" aria-label="Back">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div style="flex:1">
        <div class="topbar-title">Review reads</div>
        <div class="topbar-sub" id="review-subtitle"></div>
      </div>
    </div>
    <div class="review-body">
      <div id="review-list"></div>
      <button class="btn-primary" id="btn-final-submit" onclick="submitToMonday()">Submit all to Monday.com</button>
      <button class="btn-secondary" onclick="goToList()">Back to edit</button>
      <div class="status-msg" id="review-status"></div>
    </div>
  </div>

  <!-- DONE -->
  <div id="screen-done" class="screen">
    <div class="done-screen">
      <div class="done-icon">
        <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div class="done-title">All reads submitted!</div>
      <div class="done-sub" id="done-msg"></div>
      <button class="btn-secondary" style="max-width:240px;margin:2rem auto 0" onclick="resetApp()">Start new month</button>
    </div>
  </div>

</div>

<script>
const MONDAY_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY2MDAyNTA2OSwiYWFpIjoxMSwidWlkIjo2NzIwNDIwMywiaWFkIjoiMjAyNi0wNS0xOFQyMDo1MDo1MS42NTBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MjU5MTM0NDYsInJnbiI6InVzZTEifQ.hMDsxnrEm4tnDQtixpwzHFjN1ULjsdRraw__IkWHbfg';
const SHEET_ID = '1oQrQ3uJUepiyekoCC60j3_LxIoDtDhlsZMaLaLGohGg';
const BOARD_ID_KEY = 'br_meter_board_id';

let sites = [];
let entries = {};
let currentIdx = 0;
let boardId = localStorage.getItem(BOARD_ID_KEY) || null;

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const now = new Date();
const monthLabel = MONTHS[now.getMonth()] + ' ' + now.getFullYear();

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

async function mondayGQL(query) {
  const res = await fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': MONDAY_TOKEN, 'API-Version': '2024-01' },
    body: JSON.stringify({ query })
  });
  return res.json();
}

async function loadSites() {
  show('loading');
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
    const res = await fetch(url);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1);
    sites = [];
    for (const row of rows) {
      const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
      if (cols.length >= 2 && cols[1].toLowerCase() === 'yes' && cols[0]) {
        sites.push(cols[0]);
      }
    }
  } catch (e) { /* fallback below */ }

  if (!sites.length) {
    sites = Array.from({ length: 64 }, (_, i) => 'Site ' + (i + 1));
  }

  document.getElementById('month-label').textContent = monthLabel;
  renderList();
  show('list');
}

function renderList() {
  const list = document.getElementById('site-list');
  const done = sites.filter(s => entries[s] && entries[s].saved).length;
  const total = sites.length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  document.getElementById('progress-label').textContent = done + ' of ' + total + ' complete';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('list-footer').style.display = (done === total && total > 0) ? 'block' : 'none';

  list.innerHTML = '';
  if (!total) {
    list.innerHTML = '<div class="empty-state">No occupied sites found.<br>Check your Google Sheet.</div>';
    return;
  }

  sites.forEach((site, idx) => {
    const isDone = entries[site] && entries[site].saved;
    const card = document.createElement('div');
    card.className = 'site-card' + (isDone ? ' done' : '');
    card.innerHTML =
      '<div class="site-icon">' +
        (isDone
          ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
          : '<svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>') +
      '</div>' +
      '<span class="site-name">' + site + '</span>' +
      '<span class="site-badge">' + (isDone ? 'Done' : 'Pending') + '</span>' +
      '<span class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></span>';
    card.onclick = () => openEntry(idx);
    list.appendChild(card);
  });
}

function openEntry(idx) {
  currentIdx = idx;
  const site = sites[idx];
  document.getElementById('entry-site-name').textContent = site;
  document.getElementById('entry-counter').textContent = (idx + 1) + ' of ' + sites.length + ' sites';
  document.getElementById('entry-status').textContent = '';
  document.getElementById('entry-status').className = 'status-msg';

  const e = entries[site] || {};
  document.getElementById('input-reading').value = e.reading || '';
  document.getElementById('input-notes').value = e.notes || '';
  document.getElementById('input-photo').value = '';

  const preview = document.getElementById('photo-preview');
  const zone = document.getElementById('photo-zone');
  const label = document.getElementById('photo-label');

  if (e.photoUrl) {
    preview.src = e.photoUrl;
    preview.style.display = 'block';
    zone.classList.add('photo-taken');
    label.textContent = 'Photo attached — tap to replace';
  } else {
    preview.style.display = 'none';
    preview.src = '';
    zone.classList.remove('photo-taken');
    label.textContent = 'Tap to take photo or upload';
  }
  show('entry');
}

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const preview = document.getElementById('photo-preview');
    const zone = document.getElementById('photo-zone');
    const label = document.getElementById('photo-label');
    preview.src = e.target.result;
    preview.style.display = 'block';
    zone.classList.add('photo-taken');
    label.textContent = 'Photo attached — tap to replace';
    const site = sites[currentIdx];
    if (!entries[site]) entries[site] = {};
    entries[site].photoUrl = e.target.result;
    entries[site].photoFile = file;
  };
  reader.readAsDataURL(file);
}

function saveEntry() {
  const site = sites[currentIdx];
  const reading = document.getElementById('input-reading').value.trim();
  const notes = document.getElementById('input-notes').value.trim();
  const statusEl = document.getElementById('entry-status');

  if (!reading) {
    statusEl.textContent = 'Please enter the meter reading.';
    statusEl.className = 'status-msg error';
    return;
  }
  if (!entries[site] || !entries[site].photoUrl) {
    statusEl.textContent = 'Please attach a photo of the meter.';
    statusEl.className = 'status-msg error';
    return;
  }

  entries[site] = { ...entries[site], reading, notes, saved: true, site };
  statusEl.textContent = 'Saved!';
  statusEl.className = 'status-msg success';

  setTimeout(() => {
    const nextIdx = sites.findIndex((s, i) => i > currentIdx && !(entries[s] && entries[s].saved));
    if (nextIdx !== -1) {
      openEntry(nextIdx);
    } else {
      goToList();
    }
  }, 700);
}

function goToList() {
  renderList();
  show('list');
}

function goToReview() {
  document.getElementById('review-subtitle').textContent = sites.length + ' sites — ' + monthLabel;
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';
  sites.forEach(site => {
    const e = entries[site] || {};
    const div = document.createElement('div');
    div.className = 'review-card';
    div.innerHTML =
      '<div class="review-site">' + site + '</div>' +
      '<div class="review-row"><span class="review-label">Reading</span><span class="review-val">' + (e.reading || '—') + ' kWh</span></div>' +
      '<div class="review-row"><span class="review-label">Photo</span><span class="review-photo-ok">Attached ✓</span></div>' +
      (e.notes ? '<div class="review-row"><span class="review-label">Notes</span><span class="review-val" style="font-size:12px;text-align:right;max-width:55%">' + e.notes + '</span></div>' : '');
    reviewList.appendChild(div);
  });
  document.getElementById('review-status').textContent = '';
  document.getElementById('btn-final-submit').disabled = false;
  show('review');
}

async function ensureBoard() {
  if (boardId) return boardId;

  const wsRes = await mondayGQL(`{ workspaces { id name } }`);
  const workspaces = wsRes?.data?.workspaces || [];
  let wsId = null;
  for (const w of workspaces) {
    if (w.name.toLowerCase().includes('lighthouse')) { wsId = w.id; break; }
  }
  if (!wsId && workspaces.length) wsId = workspaces[0].id;

  const createRes = await mondayGQL(
    `mutation { create_board(board_name: "Blue Ridge TX - Monthly Meter Reads", board_kind: public${wsId ? ', workspace_id: ' + wsId : ''}) { id } }`
  );
  boardId = createRes?.data?.create_board?.id;
  if (!boardId) throw new Error('Could not create Monday board. Check your API token.');
  localStorage.setItem(BOARD_ID_KEY, boardId);

  const colDefs = [
    { title: 'Site Number', type: 'text' },
    { title: 'Meter Reading (kWh)', type: 'numbers' },
    { title: 'Read Month', type: 'text' },
    { title: 'Notes', type: 'text' }
  ];
  for (const col of colDefs) {
    await mondayGQL(`mutation { create_column(board_id: ${boardId}, title: "${col.title}", column_type: ${col.type}) { id } }`);
  }
  return boardId;
}

async function submitToMonday() {
  const btn = document.getElementById('btn-final-submit');
  const statusEl = document.getElementById('review-status');
  btn.disabled = true;
  statusEl.textContent = 'Connecting to Monday.com...';
  statusEl.className = 'status-msg';

  try {
    const bid = await ensureBoard();

    const boardRes = await mondayGQL(`{ boards(ids: [${bid}]) { columns { id title } } }`);
    const cols = boardRes?.data?.boards?.[0]?.columns || [];
    const colMap = {};
    cols.forEach(c => {
      const t = c.title.toLowerCase();
      if (t.includes('site')) colMap.site = c.id;
      else if (t.includes('reading')) colMap.reading = c.id;
      else if (t.includes('month')) colMap.month = c.id;
      else if (t.includes('notes')) colMap.notes = c.id;
    });

    let count = 0;
    for (const site of sites) {
      const e = entries[site] || {};
      statusEl.textContent = 'Submitting ' + site + '...';

      const vals = {};
      if (colMap.site) vals[colMap.site] = site;
      if (colMap.reading && e.reading) vals[colMap.reading] = e.reading;
      if (colMap.month) vals[colMap.month] = monthLabel;
      if (colMap.notes && e.notes) vals[colMap.notes] = e.notes;

      const valStr = JSON.stringify(JSON.stringify(vals));
      await mondayGQL(
        `mutation { create_item(board_id: ${bid}, item_name: "${site} — ${monthLabel}", column_values: ${valStr}) { id } }`
      );
      count++;
    }

    document.getElementById('done-msg').textContent =
      count + ' meter reads submitted to Monday.com for ' + monthLabel + '.\nPhotos are saved in this session — attach them to Monday items as needed.';
    show('done');

  } catch (err) {
    statusEl.textContent = 'Error: ' + err.message;
    statusEl.className = 'status-msg error';
    btn.disabled = false;
  }
}

function resetApp() {
  entries = {};
  renderList();
  show('list');
}

loadSites();
</script>
